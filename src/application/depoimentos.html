<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psicóloga Angela | Saúde Mental e Bem-estar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary-color: #6A9C89;
  --secondary-color: #C4DAD2;
  --text-color: #333;
  --light-bg: #F5F7F8;
}
body { font-family: 'Lato', sans-serif; color: var(--text-color); }
h1,h2,h3,h4,h5 { font-family: 'Playfair Display', serif; color: #2c3e50; }
.section-padding { padding: 80px 0; }
.bg-light-custom { background-color: var(--light-bg); }
.btn-custom {
  background-color: var(--primary-color);
  color: white;
  padding: 12px 30px;
  border-radius: 30px;
}
.btn-custom:hover { background-color: #557c6d; }
</style>
</head>

<body>

<!-- HERO -->
<header id="inicio" class="hero-section">
  <div class="container">
    <h1 class="display-4 fw-bold">Acolhimento que nasce da experiência</h1>
    <p class="lead">Cuide da sua saúde mental com quem tem vocação para ouvir</p>
  </div>
</header>

<!-- SERVIÇOS -->
<section id="servicos" class="section-padding bg-light-custom">
  <div class="container text-center">
    <h2>Como posso te ajudar?</h2>
  </div>
</section>

<!-- ================= DEPOIMENTOS ================= -->
<section id="depoimentos" class="section-padding">
  <div class="container">

    <div class="text-center mb-5">
      <h2>Depoimentos</h2>
      <p class="text-muted">O que dizem sobre o atendimento</p>
    </div>

    <!-- LISTA -->
    <div id="lista-depoimentos"></div>

    <hr class="my-5">

    <!-- FORM -->
    <h4 class="mb-3">Deixe seu depoimento</h4>
    <form id="form-depoimento">
      <div class="mb-3">
        <input type="text" name="nome" class="form-control" placeholder="Seu nome" required>
      </div>

      <div class="mb-3">
        <textarea name="mensagem" class="form-control" placeholder="Seu depoimento" required></textarea>
      </div>

      <div class="mb-3">
        <select name="estrelas" class="form-select" required>
          <option value="">Avaliação</option>
          <option value="5">⭐⭐⭐⭐⭐</option>
          <option value="4">⭐⭐⭐⭐</option>
          <option value="3">⭐⭐⭐</option>
        </select>
      </div>

      <button type="submit" class="btn btn-custom">Enviar depoimento</button>
    </form>

  </div>
</section>

<!-- FOOTER -->
<footer id="contato" class="text-center py-4 bg-dark text-white">
  © 2025 Psicóloga Angela
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_URL = "https://mes1e7p75k.execute-api.us-east-1.amazonaws.com/default/selfpsico";

/* Enviar depoimento */
document.getElementById("form-depoimento").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = e.target;
  const data = {
    nome: form.nome.value,
    mensagem: form.mensagem.value,
    estrelas: form.estrelas.value
  };

  await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  alert("Depoimento enviado com sucesso!");
  form.reset();
  carregarDepoimentos();
});

/* Carregar depoimentos */
/* Carregar depoimentos atualizado */
async function carregarDepoimentos() {
  const res = await fetch(API_URL);
  const depoimentos = await res.json();
  const div = document.getElementById("lista-depoimentos");
  div.innerHTML = "";

  depoimentos.forEach(d => {
    // Lógica das estrelas...
    let respostaHtml = d.resposta_admin 
      ? `<div class="mt-3 p-2 bg-light border-start border-4 border-success">
           <strong>Resposta da Angela:</strong> <p class="mb-0">${d.resposta_admin}</p>
         </div>` 
      : "";

    // Botão de responder (SÓ APARECE SE TIVER UM PARÂMETRO NA URL OU SENHA)
    let btnResponder = location.hash === "#admin" 
      ? `<button class="btn btn-sm btn-outline-secondary mt-2" onclick="responder('${d.id}')">Responder</button>` 
      : "";

    div.innerHTML += `
      <div class="card mb-3 shadow-sm">
        <div class="card-body">
          <strong>${d.nome}</strong>
          <p>${d.mensagem}</p>
          <div>${estrelasHtml}</div>
          ${respostaHtml}
          ${btnResponder}
        </div>
      </div>
    `;
  });
}

async function responder(id) {
  const senha = prompt("Digite a senha de administradora:");
  const resposta = prompt("Digite sua resposta:");

  if (resposta && senha) {
    await fetch(API_URL, {
      method: "PUT", // Ou POST, dependendo de como sua API foi feita
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        id: id, 
        resposta_admin: resposta, 
        admin_key: senha // A API deve validar essa senha
      })
    });
    carregarDepoimentos();
  }
}


carregarDepoimentos();
</script>

</body>
</html>
