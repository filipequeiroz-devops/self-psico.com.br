name: Deploy para o bucket selfpsico.com.br #nome do workflow

on:
  push: #ação que dispara o workflow
    branches:
      - master #branch afetada
  
  workflow_dispatch: #permite rodar manualmente

jobs: #o que vai ser feito
  deploy: #ação 1
    runs-on: ubuntu-latest #definição do sistema operacional da máquina virtual
  
    steps:
      - name: Checkout do repositorio #Clona o repositorio para a máquina virtual
        uses: actions/checkout@v4 #ação pré-definida do github para clonar o repositorio, equivalente ao git clone na linha de comando

      - name: Configurar credencias AWS
        uses: aws-actions/configure-aws-credentials@v1 #ação pré-definida do github para configurar as credenciais da AWS, equivalente ao aws configure na linha de comando
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} #variável de ambiente para a chave de acesso AWS
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} #variável de ambiente para a chave secreta AWS
          aws-region: us-east-1 #região da AWS

      - name: Ver estrutura de pastas #devido a erros no github actions, adicionei esse passo para verificar a estrutura de pastas e arquivos na máquina virtual, para garantir que os arquivos estão sendo enviados corretamente para o bucket S3
        run: |
          pwd
          ls -R

      - name: Enviar para o bucket s3
        run: | #comando para enviar os arquivos para o bucket S3 , equivalente ao aws s3 sync na linha de comando, excluindo a pasta .git  e .github para evitar enviar arquivos desnecessários para o bucket S3
            aws s3 sync ./src/application/ s3://self-psico.com.br/ --delete
        
     